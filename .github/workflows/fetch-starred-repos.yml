name: Fetch Starred Repositories

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      batch-size:
        description: 'Number of repositories to fetch per API call (max 100)'
        required: false
        default: '50'
  push:
    branches: [master]
    paths:
      - '.github/workflows/fetch-starred-repos.yml'
      - 'action/**'

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch starred repositories
        uses: ./action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}
          output-file: ./docs/data/starred-repos.json
          simple-output-file: ./docs/data/starred-repos-simple.json
          batch-size: ${{ github.event.inputs.batch-size || '50' }}

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: starred-repos-data
          path: ./docs/data/
          retention-days: 90
